<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="utf-8"/>
<title>Curve Points - Poseidon</title>
<link rel="stylesheet" href="../../css/bootstrap.min.css" >
</head>
<body>
<div class="container">
	<div th:replace="~{fragments/navbar :: navbar}"></div>
	<div class="row"><h2>Curve Point List</h2></div>
	<div class="row">
		<a href="/curvePoint/add" class="btn btn-primary btn-sm">Add New</a>
		<table class="table table-bordered">
			<thead>
				<tr>
					<th>Id</th>
					<th>CurvePointId</th>
					<th>Term</th>
					<th>Value</th>
					<th>Action</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="curvePoint : ${curvePoints.content}">
					<td style="width: 10%" th:text="${curvePoint.id}"></td>
					<td th:text="${curvePoint.id}"></td>
					<td th:text="${curvePoint.term}"></td>
					<td th:text="${curvePoint.value}"></td>
					<td style="width: 15%" class="text-center">
						<a th:href="@{/curvePoint/update/{id}(id=${curvePoint.id})}">Edit</a>&nbsp;|&nbsp;
						<form th:action="@{/curvePoint/delete/{id}(id=${curvePoint.id})}" method="post" style="display:inline;">
							<button type="submit" class="btn btn-link p-0">Delete</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
		<nav th:if="${curvePoints.totalPages > 1}">
			<ul class="pagination">
				<li class="page-item" th:classappend="${!curvePoints.hasPrevious()} ? 'disabled'">
					<a class="page-link" th:href="@{/curvePoint/list(page=${curvePoints.number - 1})}">Précédent</a>
				</li>
				<li class="page-item" th:each="i : ${#numbers.sequence(0, curvePoints.totalPages - 1)}"
					th:classappend="${i == curvePoints.number} ? 'active'">
					<a class="page-link" th:href="@{/curvePoint/list(page=${i})}" th:text="${i + 1}"></a>
				</li>
				<li class="page-item" th:classappend="${!curvePoints.hasNext()} ? 'disabled'">
					<a class="page-link" th:href="@{/curvePoint/list(page=${curvePoints.number + 1})}">Suivant</a>
				</li>
			</ul>
		</nav>
	</div>
</div>
</body>
</html>
