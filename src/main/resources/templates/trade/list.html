<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="utf-8"/>
<title>Trades - Poseidon</title>
<link rel="stylesheet" href="../../css/bootstrap.min.css" >
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
	<div class="row"><h2>Trade List</h2></div>
	<div class="row">
		<a href="/trade/add" class="btn btn-primary btn-sm">Add New</a>
		<table class="table table-bordered">
			<thead>
				<tr>
					<th>Id</th>
					<th>Account</th>
					<th>Type</th>
					<th>Buy Quantity</th>
					<th>Action</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="trade : ${trades.content}">
					<td style="width: 10%" th:text="${trade.tradeId}"></td>
					<td th:text="${trade.account}"></td>
					<td th:text="${trade.type}"></td>
					<td th:text="${trade.buyQuantity}"></td>
					<td style="width: 15%" class="text-center">
						<a th:href="@{/trade/update/{id}(id=${trade.tradeId})}">Edit</a>&nbsp;|&nbsp;
						<form th:action="@{/trade/delete/{id}(id=${trade.tradeId})}" method="post" style="display:inline;">
							<button type="submit" class="btn btn-link p-0">Delete</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
		<nav th:if="${trades.totalPages > 1}">
			<ul class="pagination">
				<li class="page-item" th:classappend="${!trades.hasPrevious()} ? 'disabled'">
					<a class="page-link" th:href="@{/trade/list(page=${trades.number - 1})}">Précédent</a>
				</li>
				<li class="page-item" th:each="i : ${#numbers.sequence(0, trades.totalPages - 1)}"
					th:classappend="${i == trades.number} ? 'active'">
					<a class="page-link" th:href="@{/trade/list(page=${i})}" th:text="${i + 1}"></a>
				</li>
				<li class="page-item" th:classappend="${!trades.hasNext()} ? 'disabled'">
					<a class="page-link" th:href="@{/trade/list(page=${trades.number + 1})}">Suivant</a>
				</li>
			</ul>
		</nav>
	</div>
</div>
</body>
</html>
