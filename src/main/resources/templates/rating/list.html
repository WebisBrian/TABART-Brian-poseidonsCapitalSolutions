<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="utf-8"/>
<title>Ratings - Poseidon</title>
<link rel="stylesheet" href="../../css/bootstrap.min.css" >
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
	<div class="row"><h2>Rating List</h2></div>
	<div class="row">
		<a href="/rating/add" class="btn btn-primary btn-sm">Add New</a>
		<table class="table table-bordered">
			<thead>
				<tr>
					<th>Id</th>
					<th>MoodysRating</th>
					<th>SandPRating</th>
					<th>FitchRating</th>
					<th>Order</th>
					<th>Action</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="rating : ${ratings.content}">
					<td style="width: 10%" th:text="${rating.id}"></td>
					<td th:text="${rating.moodysRating}"></td>
					<td th:text="${rating.sandPRating}"></td>
					<td th:text="${rating.fitchRating}"></td>
					<td th:text="${rating.orderNumber}"></td>
					<td style="width: 15%" class="text-center">
						<a th:href="@{/rating/update/{id}(id=${rating.id})}">Edit</a>&nbsp;|&nbsp;
						<form th:action="@{/rating/delete/{id}(id=${rating.id})}" method="post" style="display:inline;">
							<button type="submit" class="btn btn-link p-0">Delete</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
		<nav th:if="${ratings.totalPages > 1}">
			<ul class="pagination">
				<li class="page-item" th:classappend="${!ratings.hasPrevious()} ? 'disabled'">
					<a class="page-link" th:href="@{/rating/list(page=${ratings.number - 1})}">Précédent</a>
				</li>
				<li class="page-item" th:each="i : ${#numbers.sequence(0, ratings.totalPages - 1)}"
					th:classappend="${i == ratings.number} ? 'active'">
					<a class="page-link" th:href="@{/rating/list(page=${i})}" th:text="${i + 1}"></a>
				</li>
				<li class="page-item" th:classappend="${!ratings.hasNext()} ? 'disabled'">
					<a class="page-link" th:href="@{/rating/list(page=${ratings.number + 1})}">Suivant</a>
				</li>
			</ul>
		</nav>
	</div>
</div>
</body>
</html>
